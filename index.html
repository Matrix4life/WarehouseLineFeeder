    const nowIso = ()=> new Date().toISOString();

    const msToMins = (ms)=> Math.max(0, Math.floor(ms/60000));

    const canNotify = ()=> ('Notification' in window);
    const requestNotifyPermission = async ()=>{
      if (!canNotify()) return false;

      const p = await Notification.requestPermission();
      return p === 'granted';
    };

    const _seen = (()=>{ try{return new Set(JSON.parse(localStorage.getItem(_LS)||"[]"));}catch(e){return new Set();} })();
    const _addSeen = k => { _seen.add(k); try{localStorage.setItem(_LS,JSON.stringify([..._seen].slice(-500)));}catch(e){} };
    let _seeded = false;  // first loadAll seeds ALL existing statuses — no toasts for old data
    let _wdUser = "";     // kept current via useEffect
    let _wdUserRole = ""; // kept current via useEffect
    let _toastTmr = null;
    let _audioCtx = null;
    function _getAudioCtx() {
      if (!_audioCtx) {
        try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
      }
      if (_audioCtx && _audioCtx.state === "suspended") _audioCtx.resume();
      return _audioCtx;
    }
    function _unlockAudio() {
      const ctx = _getAudioCtx();
      if (ctx && ctx.state === "suspended") ctx.resume();
    }
    document.addEventListener("touchstart", _unlockAudio, { once: true });
    document.addEventListener("click", _unlockAudio, { once: true });

    });
    window.addEventListener("wd-install-done", () => {
      const btn = document.getElementById("wd-install-btn");
      if (btn) btn.style.display = "none";
    });
    function _aimNote(ctx, freq, startTime, duration, vol) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, startTime);
      gain.gain.setValueAtTime(0.0, startTime);
      gain.gain.linearRampToValueAtTime(vol, startTime + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(startTime);
      osc.stop(startTime + duration + 0.05);
    }
    function _playDing(type = "default") {
      const ctx = _getAudioCtx();
      if (!ctx) return;
      try {
        const t = ctx.currentTime;
        if (type === "chat") {
          _aimNote(ctx, 494, t,        0.18, 0.22); // Bb4 — the "duh"
          _aimNote(ctx, 659, t + 0.13, 0.28, 0.32); // E5  — the "DUM"

        } else if (type === "high") {
          _aimNote(ctx, 659, t,        0.12, 0.25); // E5
          _aimNote(ctx, 784, t + 0.10, 0.12, 0.28); // G5
          _aimNote(ctx, 988, t + 0.20, 0.22, 0.35); // B5 — highest, loudest

        } else if (type === "done") {
          _aimNote(ctx, 523, t,        0.20, 0.22); // C5
          _aimNote(ctx, 784, t + 0.16, 0.35, 0.28); // G5 — resolution

        } else if (type === "cancelled") {
          _aimNote(ctx, 659, t,        0.18, 0.25); // E5
          _aimNote(ctx, 494, t + 0.14, 0.30, 0.20); // Bb4 — drops down

        } else if (type === "break") {
          _aimNote(ctx, 659, t, 0.30, 0.22); // E5

        } else {
          _aimNote(ctx, 587, t,        0.16, 0.25); // D5
          _aimNote(ctx, 740, t + 0.12, 0.25, 0.30); // F#5
        }
      } catch(e) { console.warn("[Audio] ding failed:", e); }
    }
    function _vibrate(pattern) {
      if (navigator.vibrate) { try { navigator.vibrate(pattern); } catch(e) {} }
    }
    window._wdCustomSounds = {};
    function _playCustomSound(dataUrl) {
      try {
        const audio = new Audio(dataUrl);
        audio.volume = 0.75;
        audio.play().catch(() => {});
      } catch(e) { console.warn("[Audio] custom sound failed:", e); }
    }
    function _notifyAV(type) {
      if (localStorage.getItem("wd_mute_av") === "1") return;
      const customSound = window._wdCustomSounds[type];
      if (customSound) {
        _playCustomSound(customSound);
        const vibrateMap = {
          high_priority: [150, 80, 150, 80, 150],
          completed:     [100],
          cancelled:     [200, 100, 200],
          chat:          [80],
          break:         [120, 60, 120],
        };
        _vibrate(vibrateMap[type] || [100, 50, 100]);
        return;
      }
      switch(type) {
        case "high_priority": _playDing("high");    _vibrate([150, 80, 150, 80, 150]); break;
        case "completed":     _playDing("done");    _vibrate([100]);                   break;
        case "cancelled":     _playDing("default"); _vibrate([200, 100, 200]);          break;
        case "chat":          _playDing("chat");    _vibrate([80]);                    break;
        case "break":         _playDing("default"); _vibrate([120, 60, 120]);           break;
        default:              _playDing("default"); _vibrate([100, 50, 100]);           break;
      }
    }

    function BreakCountdown({ startedAt, breakMins, onEnd }) {
      const [, tick] = React.useState(0);
      React.useEffect(() => {
        const t = setInterval(() => tick(n => n + 1), 1000);
        return () => clearInterval(t);
      }, []);
      const elapsed = (Date.now() - new Date(startedAt).getTime()) / 1000;
      const secsLeft = Math.max(0, Math.floor(breakMins * 60 - elapsed));
      const overdue = elapsed >= breakMins * 60;
      const elMins = Math.floor(elapsed / 60);
      const m = Math.floor(secsLeft / 60), s = secsLeft % 60;
      return (
        <button onClick={onEnd}
          style={{padding:"0.45rem 0.85rem",borderRadius:"10px",fontFamily:"'Space Mono','Courier New',monospace",fontWeight:900,fontSize:"0.78rem",cursor:"pointer",border:"none",color:"#fff",animation:"pulse 1.5s ease-in-out infinite", background: overdue ? "linear-gradient(135deg,#ff4444,#cc2222)" : "linear-gradient(135deg,#ff9f43,#e67e22)"}}>
          {overdue ? `⚠️ ${elMins}m OVERDUE — Back?` : `🍵 ${m}:${String(s).padStart(2,"0")} — Back?`}
        </button>
      );
    }

        const thisMonth = new Date(now.getFullYear(), now.getMonth(), 1);
        const yesterday = getYesterday();
        const allReqs = [...requests, ...archivedRequests];
        const filteredReqs = allReqs.filter(r => {
          const submitted = new Date(r.submittedAt);
          if (timeFilter === "today"     && submitted < today) return false;
          if (timeFilter === "week"      && submitted < thisWeek) return false;
          if (timeFilter === "month"     && submitted < thisMonth) return false;
          if (timeFilter === "yesterday" && (submitted < yesterday.start || submitted > yesterday.end)) return false;
          if (timeFilter === "custom") {
            if (exportDateFrom && submitted < new Date(exportDateFrom)) return false;
            if (exportDateTo   && submitted > new Date(exportDateTo + "T23:59:59")) return false;

          if (dashRoomFilter !== "all" && r.room !== dashRoomFilter) return false;

        const highPriority = filteredReqs.filter(r => r.priority).length;
        const active = pending + claimed + inProgress;
        const completionRate = total > 0 ? Math.round((completed / total) * 100) : 0;
        const completedReqs = filteredReqs.filter(r => r.status === "completed" && r.submittedAt && r.completedAt);

          const start = new Date(r.submittedAt);
          const end = new Date(r.completedAt);

        }).length;
        const slaRate = completedReqs.length > 0 ? Math.round((slaCompliant / completedReqs.length) * 100) : 0;
        const byRoom = {};
        filteredReqs.forEach(r => {

        });
        const topRooms = Object.entries(byRoom).sort((a, b) => b[1] - a[1]).slice(0, 5);
        const maxRoomCount = topRooms.length > 0 ? topRooms[0][1] : 1;
        const EXCLUDED_ROLES = new Set(["admin","supervisor","superuser"]);

                        <div style={{ marginTop:'0.6rem', fontSize:'0.65rem', color:'#334155' }}>Click a row to filter dashboard by that room</div>

            </div>
            {_breakPanelJsx}
            {_chatUI}
            {_chatFab}

      if (screen === "completed") {
        const now = new Date();

        const thisMonth = new Date(now.getFullYear(), now.getMonth(), 1);
        const yesterday = getYesterday();
        const completedReqs = [...requests, ...archivedRequests].filter(r => r.status === "completed");
        const filteredCompletedReqs = completedReqs.filter(r => {
          const completed = new Date(r.completedAt);
          if (timeFilter === "today")     return completed >= today;
          if (timeFilter === "week")      return completed >= thisWeek;
          if (timeFilter === "month")     return completed >= thisMonth;
          if (timeFilter === "yesterday") return completed >= yesterday.start && completed <= yesterday.end;
          if (timeFilter === "custom") {
            if (exportDateFrom && completed < new Date(exportDateFrom)) return false;
            if (exportDateTo && completed > new Date(exportDateTo + "T23:59:59")) return false;
            return true;
          }
          return true; // all
        }).filter(r => !exportRoom || r.room === exportRoom);
        const sortedCompleted = [...filteredCompletedReqs].sort((a, b) => {
          return new Date(b.completedAt) - new Date(a.completedAt);

        const totalCompleted = sortedCompleted.length;
        const avgTime = sortedCompleted.length > 0
          ? Math.round(sortedCompleted.reduce((sum, r) =>
              sum + (new Date(r.completedAt) - new Date(r.submittedAt)) / 60000, 0) / sortedCompleted.length)
          : 0;
        const pickable = sortedCompleted.filter(r => r.claimedAt &&
          (new Date(r.completedAt) - new Date(r.claimedAt)) > 0);
        const avgPickTimeCompleted = pickable.length > 0
          ? Math.round(pickable.reduce((sum, r) =>
              sum + (new Date(r.completedAt) - new Date(r.claimedAt)) / 60000, 0) / pickable.length)
          : 0;
        const buildRows = (data) => data.map(r => {
          const start = new Date(r.submittedAt);
          const end = new Date(r.completedAt);
          const timeMin = Math.round((end - start) / 60000);
          return [r.id, r.item, r.room, r.qty + (r.adjQty ? ` (remaining:${r.adjQty})` : ''),
            r.priority ? 'HIGH' : 'NORMAL', new Date(r.submittedAt).toLocaleString(),
            r.submittedBy||'', r.claimedBy||'', new Date(r.completedAt).toLocaleString(),
            r.completedBy||'', timeMin, (r.comments||'').replace(/,/g,';')];
        });

          const headers = ["ID","Item","Room","Qty","Priority","Submitted At","Submitted By","Claimed By","Completed At","Completed By","Time (min)","Comments"];
          const rows = buildRows(sortedCompleted);
          const csv = [headers.join(','), ...rows.map(row => row.map(c=>`"${c}"`).join(','))].join('\n');
          const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          const label = timeFilter==="custom" ? `${exportDateFrom||'start'}-to-${exportDateTo||'end'}` : timeFilter==="yesterday" ? "yesterday" : timeFilter;
          a.download = `completed-${label}${exportRoom?'-'+exportRoom:''}-${new Date().toISOString().split('T')[0]}.csv`;
          a.click();
        };
        const exportToPDF = () => {
          const label = timeFilter==="custom" ? `${exportDateFrom||'start'} → ${exportDateTo||'end'}` : timeFilter==="yesterday" ? "Yesterday" : timeFilter.charAt(0).toUpperCase()+timeFilter.slice(1);

<style>
  body{font-family:'Segoe UI',Arial,sans-serif;padding:20px;color:#111;background:#fff;}
  h1{font-size:1.4rem;margin:0 0 4px 0;} .meta{color:#666;font-size:0.85rem;margin-bottom:16px;}

  td{padding:7px 10px;border-bottom:1px solid #e5e7eb;vertical-align:top;}
  tr:nth-child(even) td{background:#f9fafb;}
  .high{background:#fee2e2;color:#b91c1c;padding:2px 6px;border-radius:4px;font-weight:700;font-size:0.75rem;}
  .time-ok{color:#16a34a;font-weight:700;} .time-warn{color:#ca8a04;font-weight:700;} .time-bad{color:#dc2626;font-weight:700;}
  @media print{body{padding:0;} button{display:none;}}
</style></head><body>
<h1>📦 Completed Requests Export</h1>
<div class="meta">Period: ${label}${roomLabel} · Generated: ${new Date().toLocaleString()} · Total: ${sortedCompleted.length} records</div>
<button onclick="window.print()" style="margin-bottom:12px;padding:8px 16px;background:#0a0e1a;color:#00ff88;border:none;border-radius:6px;cursor:pointer;font-weight:700;">🖨️ Print / Save as PDF</button>
<table><thead><tr><th>Item</th><th>Room</th><th>Qty</th><th>Priority</th><th>Submitted</th><th>Completed</th><th>Time</th><th>Claimed By</th><th>Completed By</th><th>Comments</th></tr></thead><tbody>
${sortedCompleted.map(r => {
  const tmin = Math.round((new Date(r.completedAt)-new Date(r.submittedAt))/60000);
  const tc = tmin<=5?'time-ok':tmin<=10?'time-warn':'time-bad';
  return `<tr><td><strong>${r.item}</strong></td><td>${r.room}</td><td>${r.qty}${r.adjQty?` <small>(remaining:${r.adjQty})</small>`:''}</td>
<td>${r.priority?'<span class="high">HIGH</span>':''}</td>
<td>${new Date(r.submittedAt).toLocaleString()}<br><small style="color:#666">${r.submittedBy||''}</small></td>
<td>${new Date(r.completedAt).toLocaleString()}</td>
<td class="${tc}">${tmin}min</td><td>${r.claimedBy||'—'}</td><td>${r.completedBy||'—'}</td><td>${r.comments||''}</td></tr>`;
}).join('')}
</tbody></table></body></html>`);
          w.document.close();

                          const timeColor = timeMin <= 5 ? '#00ff88' : timeMin <= 10 ? '#fbbf24' : '#ff4444';
                          const pickMin = req.claimedAt ? Math.round((end - new Date(req.claimedAt)) / 60000) : null;

                          return (
                            <tr key={req.id} style={{ borderBottom: idx < sortedCompleted.length - 1 ? '1px solid #334155' : 'none', background: idx % 2 === 0 ? 'transparent' : 'rgba(0,255,136,0.02)' }}>

                              </td>
                              <td style={cellStyle}>
                                <div style={{ display:'flex', alignItems:'center', gap:'0.4rem' }}>
                                  <MapPin size={14} color={CONFIG.ROOM_COLORS[req.room] || "#8b9dc3"} />
                                  {req.room}

                              </td>
                              <td style={cellStyle}>
                                {req.adjQty > 0 && req.adjQty < req.qty ? (
                                  <div style={{ fontWeight:900 }}><span style={{ color:'#38bdf8' }}>{req.adjQty}</span> / <span style={{ color:'#fbbf24' }}>{req.qty}</span></div>
                                ) : (

                                <div style={{ fontSize:'0.85rem' }}>{niceTime(req.submittedAt)}</div>
                                <div style={{ fontSize:'0.75rem', color:'#8b9dc3' }}>{req.submittedBy}</div>

                              <td style={cellStyle}>
                                <div style={{ fontSize:'0.85rem' }}>{niceTime(req.completedAt)}</div>
                                <div style={{ fontSize:'0.75rem', color:'#00ff88' }}>{req.completedBy}</div>
                              </td>

                                <div style={{ fontWeight:900, color: timeColor, fontSize:'1rem' }}>

                              <td style={cellStyle}>
                                <div style={{ fontSize:'0.85rem', color:'#8b9dc3' }}>{req.claimedBy || '—'}</div>
                              </td>
                              <td style={cellStyle}>
                                <div style={{ fontSize:'0.85rem', color:'#8b9dc3', maxWidth:'200px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                                  {req.comments || '—'}
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </div>
            {_breakPanelJsx}
            {_chatUI}
            {_chatFab}
          </div>
        );
      }
      if (screen === "settings") {
        if (!canSuperuser) {
          return (
            <div style={{ minHeight:'100vh', ...bg, padding:'1.5rem', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <div style={gridOverlay} />
              <div style={{ textAlign:'center', color:'#ff4444', position:'relative', zIndex:1 }}>
                <h2>🔒 Access Restricted</h2>
                <p style={{color:'#8b9dc3'}}>You do not have permission to access this area.</p>
                <button onClick={()=> setRoute("admin")} style={{ padding:'0.7rem 1.5rem', background:'linear-gradient(135deg,#ff4444,#cc3333)', border:'none', borderRadius:'8px', color:'#fff', fontWeight:900, cursor:'pointer', marginTop:'1rem' }}>Back to Admin</button>
              </div>
            </div>
          );
        }
        const SETTING_GROUPS = [
          { id:"sla", title:"SLA Thresholds", icon:"🎯", color:"#00ff88",
            desc:"Controls color badges on requests and SLA compliance calculations",
            items:[
              { key:"sla_minutes_warn", label:"Warning", unit:"min", desc:"Turns green — request is aging", min:1, max:60, type:"number" },
              { key:"sla_minutes_bad", label:"Bad", unit:"min", desc:"Turns yellow — needs attention", min:1, max:120, type:"number" },
              { key:"sla_minutes_crit", label:"Critical", unit:"min", desc:"Turns red with fire — overdue", min:1, max:180, type:"number" },
            ]},
          { id:"pick_sla", title:"Warehouse Pick SLA", icon:"⚡", color:"#ff9f43",
            desc:"Target time from when warehouse claims a pick to marking it done",
            items:[
              { key:"pick_sla_warn", label:"Good", unit:"min", desc:"At or under this = green (fast pick)", min:1, max:30, type:"number" },
              { key:"pick_sla_bad",  label:"Slow", unit:"min", desc:"Above good threshold = yellow (slowing down)", min:1, max:60, type:"number" },
              { key:"pick_sla_crit", label:"Critical", unit:"min", desc:"Above this = red (too slow)", min:1, max:120, type:"number" },
            ]},
          { id:"breaks", title:"Break Duration", icon:"🍵", color:"#ff9f43",
            desc:"How long warehouse workers get for breaks",
            items:[
              { key:"break_duration_min", label:"Break Length", unit:"min", desc:"Countdown timer duration for worker breaks", min:5, max:60, type:"number" },
            ]},
          { id:"performance", title:"Performance Scoring", icon:"🏆", color:"#00ff88",
            desc:"Configure staff performance rating metrics and weights (Option 4: Percentage-Based Ranking)",
            items:[
              { key:"perf_weight_items", label:"Items Weight", unit:"%", desc:"Weight for items completed (0-100)", min:0, max:100, type:"number" },
              { key:"perf_weight_room_wait", label:"Room Wait Weight", unit:"%", desc:"Weight for room wait time efficiency (0-100)", min:0, max:100, type:"number" },
              { key:"perf_weight_pick_time", label:"Pick Time Weight", unit:"%", desc:"Weight for pick time efficiency (0-100)", min:0, max:100, type:"number" },
              { key:"perf_tier_excellent", label:"Excellent Threshold", unit:"%", desc:"Score required for Excellent tier", min:0, max:100, type:"number" },
              { key:"perf_tier_good", label:"Good Threshold", unit:"%", desc:"Score required for Good tier", min:0, max:100, type:"number" },
              { key:"perf_tier_fair", label:"Fair Threshold", unit:"%", desc:"Score required for Fair tier", min:0, max:100, type:"number" },
            ]},
          { id:"backlog", title:"Backlog Thresholds", icon:"📊", color:"#38bdf8",
            desc:"Controls backlog counter color coding on analytics dashboard",
            items:[
              { key:"backlog_green_max", label:"Green Max", unit:"reqs", desc:"At or below this count = green (healthy)", min:1, max:50, type:"number" },
              { key:"backlog_yellow_max", label:"Yellow Max", unit:"reqs", desc:"At or below this = yellow. Above = red.", min:1, max:100, type:"number" },
            ]},
          { id:"shifts", title:"Shift Schedule", icon:"🕐", color:"#a78bfa",
            desc:"Defines shift boundaries for analytics grouping and scheduling",
            items:[
              { key:"shift_1_start", label:"1st Shift Start", unit:"", desc:"When first shift begins", type:"time" },
              { key:"shift_1_end", label:"1st Shift End", unit:"", desc:"When first shift ends", type:"time" },
              { key:"shift_2_start", label:"2nd Shift Start", unit:"", desc:"When second shift begins", type:"time" },
              { key:"shift_2_end", label:"2nd Shift End", unit:"", desc:"When second shift ends", type:"time" },
            ]},
          { id:"sounds", title:"Notification Sounds", icon:"🔊", color:"#a78bfa",
            desc:"Upload custom sounds for each notification type. Stored in Supabase — applies instantly to all devices.",
            items:[] },
          { id:"system", title:"System Timing", icon:"⚙️", color:"#64748b",
            desc:"Polling intervals and automated operations",
            items:[
              { key:"poll_interval_ms", label:"Local Poll Rate", unit:"ms", desc:"Fallback polling interval (non-Supabase mode)", min:1000, max:30000, type:"number" },
              { key:"supabase_poll_ms", label:"Supabase Poll Rate", unit:"ms", desc:"Backup polling interval — Realtime handles live data; poll is safety net only. Recommend 60000ms.", min:30000, max:300000, type:"number" },
              { key:"auto_archive_hour", label:"Auto-Archive Hour", unit:"h (0-23)", desc:"Hour of day to auto-archive (0 = midnight)", min:0, max:23, type:"number" },
            ]},
        ];
        const DEFAULTS = {
          sla_minutes_warn:"5", sla_minutes_bad:"10", sla_minutes_crit:"20",
          pick_sla_warn:"3", pick_sla_bad:"7", pick_sla_crit:"12",
          break_duration_min:"15", backlog_green_max:"3", backlog_yellow_max:"8",
          poll_interval_ms:"2500", supabase_poll_ms:"60000", auto_archive_hour:"0",
          shift_1_start:"06:00", shift_1_end:"14:00", shift_2_start:"14:00", shift_2_end:"22:00",
        };
        const curEdit = Object.keys(editSettings).length > 0 ? editSettings : { ...DEFAULTS, ...sysSettings };
        const updateSetting = (key, val) => {
          const next = { ...curEdit, [key]: val };
          setEditSettings(next);
          setDirtyKeys(prev => ({ ...prev, [key]: true }));
          setSettingsSaved(false);
        };
        const hasDirty = Object.keys(dirtyKeys).length > 0;
        const grp = SETTING_GROUPS.find(g => g.id === activeSettingsTab);
        const settingsErrors = [];
        const w = parseInt(curEdit.sla_minutes_warn), b = parseInt(curEdit.sla_minutes_bad), c2 = parseInt(curEdit.sla_minutes_crit);
        if (w >= b) settingsErrors.push("SLA Warning must be less than Bad");
        if (b >= c2) settingsErrors.push("SLA Bad must be less than Critical");
        const pw2 = parseInt(curEdit.pick_sla_warn), pb2 = parseInt(curEdit.pick_sla_bad), pc2 = parseInt(curEdit.pick_sla_crit);
        if (pw2 >= pb2) settingsErrors.push("Pick SLA Good must be less than Slow");
        if (pb2 >= pc2) settingsErrors.push("Pick SLA Slow must be less than Critical");
        if (parseInt(curEdit.backlog_green_max) >= parseInt(curEdit.backlog_yellow_max)) settingsErrors.push("Backlog Green Max must be less than Yellow Max");
        const handleSaveSettings = async () => {
          setSettingsSaving(true);
          try {
            for (const key of Object.keys(dirtyKeys)) {
              await adapterRef.current.saveSetting(key, curEdit[key], userName);
            }
            const fresh = await adapterRef.current.loadSettings();
            _updateSysSettings(fresh);
            setDirtyKeys({});
            setSettingsSaved(true);
            setTimeout(() => setSettingsSaved(false), 3000);
          } catch(e) { console.error("Save settings error:", e); }
          setSettingsSaving(false);
        };
        const SLAPreviewInline = () => {
          const pw=parseInt(curEdit.sla_minutes_warn)||5, pb=parseInt(curEdit.sla_minutes_bad)||10, pc=parseInt(curEdit.sla_minutes_crit)||20;
          const examples=[{m:Math.max(1,pw-2),l:"Normal"},{m:pw,l:"Warning"},{m:pb,l:"Bad"},{m:pc,l:"Critical"}];
          return (
            <div style={{display:"flex",gap:"0.5rem",flexWrap:"wrap",marginTop:"0.75rem"}}>
              {examples.map(ex => {
                let ebg="#1e293b",efg="#8b9dc3",sf="";
                if(ex.m>=pc){ebg="#ff4444";efg="#fff";sf=" 🔥";}
                else if(ex.m>=pb){ebg="#fbbf24";efg="#0a0e1a";}
                else if(ex.m>=pw){ebg="#22c55e";efg="#0a0e1a";}
                return (
                  <div key={ex.l} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"0.25rem"}}>
                    <span style={{padding:"0.3rem 0.6rem",background:ebg,color:efg,borderRadius:"6px",fontSize:"0.75rem",fontWeight:900}}>{ex.m}m{sf}</span>
                    <span style={{fontSize:"0.6rem",color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em"}}>{ex.l}</span>
                  </div>
                );
              })}
            </div>
          );
        };
        const BacklogPreviewInline = () => {
          const gm=parseInt(curEdit.backlog_green_max)||3, ym=parseInt(curEdit.backlog_yellow_max)||8;
          return (
            <div style={{display:"flex",gap:"0.75rem",marginTop:"0.75rem"}}>
              {[{ct:gm,cl:"#00ff88",lb:"Healthy"},{ct:ym,cl:"#fbbf24",lb:"Warning"},{ct:ym+3,cl:"#ff4444",lb:"Critical"}].map(e=>(
                <div key={e.lb} style={{textAlign:"center"}}>
                  <div style={{fontSize:"1.5rem",fontWeight:900,color:e.cl}}>{e.ct}</div>
                  <div style={{fontSize:"0.55rem",color:"#64748b",textTransform:"uppercase"}}>{e.lb}</div>
                </div>
              ))}
            </div>
          );
        };
        return (
          <div style={{ minHeight:'100vh', ...bg, padding:'1.5rem', position:'relative', overflow:'hidden' }}>
            <div style={gridOverlay} />
            <div style={{ maxWidth:'1200px', margin:'0 auto', position:'relative', zIndex:1 }}>
              <EnhancedHeader title="System Settings" description="Warehouse configuration & control" />

              {hasDirty && (
                <div style={{position:"sticky",top:"0.75rem",zIndex:50,background:"rgba(10,14,26,0.95)",backdropFilter:"blur(12px)",border:settingsErrors.length>0?"1.5px solid #ff4444":"1.5px solid #ffd700",borderRadius:"12px",padding:"0.75rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem",gap:"1rem",flexWrap:"wrap"}}>
                  <div>
                    <span style={{color:settingsErrors.length>0?"#ff4444":"#ffd700",fontWeight:800,fontSize:"0.85rem"}}>{settingsErrors.length>0?"⚠️ Validation Error":`⚡ ${Object.keys(dirtyKeys).length} unsaved change${Object.keys(dirtyKeys).length>1?"s":""}`}</span>
                    {settingsErrors.length>0&&<div style={{color:"#ff4444",fontSize:"0.7rem",marginTop:"0.2rem"}}>{settingsErrors.join(" • ")}</div>}
                  </div>
                  <div style={{display:"flex",gap:"0.5rem"}}>
                    <button onClick={()=>{setEditSettings({});setDirtyKeys({});}} style={{padding:"0.5rem 1rem",borderRadius:"8px",border:"1px solid #475569",background:"transparent",color:"#8b9dc3",fontWeight:700,cursor:"pointer",fontSize:"0.8rem"}}>Discard</button>
                    <button onClick={handleSaveSettings} disabled={settingsErrors.length>0||settingsSaving} style={{padding:"0.5rem 1.5rem",borderRadius:"8px",border:"none",background:settingsErrors.length>0?"#475569":"linear-gradient(135deg,#ffd700,#ffaa00)",color:"#0a0e1a",fontWeight:900,cursor:settingsErrors.length>0?"not-allowed":"pointer",fontSize:"0.8rem",opacity:settingsSaving?0.6:1}}>{settingsSaving?"Saving...":"Save All"}</button>
                  </div>
                </div>
              )}

              {settingsSaved && !hasDirty && (
                <div style={{padding:"0.75rem 1rem",background:"rgba(0,255,136,0.1)",border:"1px solid rgba(0,255,136,0.3)",borderRadius:"10px",color:"#00ff88",fontWeight:800,marginBottom:"1rem",fontSize:"0.85rem"}}>✅ Settings saved and synced to all devices</div>
              )}

              <div style={{display:"flex",gap:"0.5rem",marginBottom:"1.5rem",flexWrap:"wrap",overflowX:"auto",paddingBottom:"0.25rem"}}>
                {SETTING_GROUPS.map(g => {
                  const isActive = activeSettingsTab === g.id;
                  const dc = g.items.filter(s => dirtyKeys[s.key]).length;
                  return (
                    <button key={g.id} onClick={() => setActiveSettingsTab(g.id)}
                      style={{padding:"0.6rem 1rem",borderRadius:"10px",cursor:"pointer",background:isActive?`${g.color}18`:"rgba(15,23,42,0.6)",border:isActive?`1.5px solid ${g.color}60`:"1.5px solid #1e293b",color:isActive?g.color:"#64748b",fontWeight:800,fontSize:"0.78rem",whiteSpace:"nowrap",transition:"all 0.15s ease",position:"relative"}}>
                      {g.icon} {g.title}
                      {dc>0&&<span style={{position:"absolute",top:-4,right:-4,background:"#ffd700",color:"#0a0e1a",borderRadius:"50%",width:16,height:16,fontSize:"0.55rem",fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",border:"2px solid #0a0e1a"}}>{dc}</span>}
                    </button>
                  );
                })}
              </div>

              {grp && (
                <div style={{background:"rgba(15,23,42,0.85)",border:`1px solid ${grp.color}30`,borderRadius:"14px",padding:"1.5rem",marginBottom:"1.5rem"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"0.5rem",marginBottom:"0.25rem"}}>
                    <span style={{fontSize:"1.3rem"}}>{grp.icon}</span>
                    <h2 style={{margin:0,fontSize:"1.2rem",fontWeight:900,color:grp.color}}>{grp.title}</h2>
                  </div>
                  <p style={{color:"#64748b",fontSize:"0.78rem",margin:"0 0 1.25rem 0"}}>{grp.desc}</p>

                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:"1rem"}}>
                    {grp.items.map(s => {
                      const isDirty = dirtyKeys[s.key];
                      return (
                        <div key={s.key} style={{background:isDirty?"rgba(255,215,0,0.04)":"rgba(15,23,42,0.5)",border:isDirty?"1px solid rgba(255,215,0,0.25)":"1px solid #1e293b",borderRadius:"10px",padding:"1rem",transition:"border-color 0.15s ease"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.5rem"}}>
                            <label style={{color:"#e2e8f0",fontWeight:800,fontSize:"0.85rem"}}>{s.label}</label>
                            {isDirty&&<span style={{padding:"0.1rem 0.4rem",background:"rgba(255,215,0,0.15)",borderRadius:"4px",color:"#ffd700",fontSize:"0.55rem",fontWeight:900}}>CHANGED</span>}
                          </div>
                          <p style={{color:"#64748b",fontSize:"0.7rem",margin:"0 0 0.6rem 0"}}>{s.desc}</p>
                          <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
                            {s.type==="time"?(
                              <input type="time" value={curEdit[s.key]||""} onChange={e=>updateSetting(s.key,e.target.value)} style={{flex:1,padding:"0.6rem",background:"#0f172a",border:"1px solid #334155",borderRadius:"8px",color:"#e2e8f0",fontSize:"0.9rem",fontWeight:700,fontFamily:"inherit"}}/>
                            ):(
                              <React.Fragment>
                                <input type="number" value={curEdit[s.key]||""} onChange={e=>updateSetting(s.key,e.target.value)} min={s.min} max={s.max} style={{width:"80px",padding:"0.6rem",background:"#0f172a",border:"1px solid #334155",borderRadius:"8px",color:"#e2e8f0",fontSize:"1rem",fontWeight:900,textAlign:"center",fontFamily:"inherit"}}/>
                                <span style={{color:"#64748b",fontSize:"0.75rem",fontWeight:600}}>{s.unit}</span>
                                <input type="range" value={curEdit[s.key]||0} onChange={e=>updateSetting(s.key,e.target.value)} min={s.min} max={s.max} style={{flex:1,accentColor:grp.color}}/>
                              </React.Fragment>
                            )}
                          </div>
                          {isDirty&&<div style={{marginTop:"0.4rem",fontSize:"0.65rem",color:"#475569"}}>Default: {DEFAULTS[s.key]}{s.unit?` ${s.unit}`:""}</div>}
                        </div>
                      );
                    })}
                  </div>

                  {activeSettingsTab==="sla"&&(
                    <div style={{marginTop:"1.25rem",padding:"1rem",background:"rgba(0,255,136,0.04)",border:"1px solid rgba(0,255,136,0.15)",borderRadius:"10px"}}>
                      <div style={{color:"#8b9dc3",fontSize:"0.7rem",fontWeight:800,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.25rem"}}>Live Preview — Request badges will look like:</div>
                      <SLAPreviewInline />
                    </div>
                  )}
                  {activeSettingsTab==="backlog"&&(
                    <div style={{marginTop:"1.25rem",padding:"1rem",background:"rgba(56,189,248,0.04)",border:"1px solid rgba(56,189,248,0.15)",borderRadius:"10px"}}>
                      <div style={{color:"#8b9dc3",fontSize:"0.7rem",fontWeight:800,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.25rem"}}>Live Preview — Backlog counter colors:</div>
                      <BacklogPreviewInline />
                    </div>
                  )}
                  {activeSettingsTab==="shifts"&&(
                    <div style={{marginTop:"1.25rem",padding:"1rem",background:"rgba(167,139,250,0.04)",border:"1px solid rgba(167,139,250,0.15)",borderRadius:"10px"}}>
                      <div style={{color:"#8b9dc3",fontSize:"0.7rem",fontWeight:800,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"0.5rem"}}>Shift Timeline</div>
                      <div style={{display:"flex",height:"32px",borderRadius:"8px",overflow:"hidden",border:"1px solid #334155"}}>
                        <div style={{flex:1,background:"#1e293b",position:"relative"}}>
                          <div style={{position:"absolute",left:`${(parseInt(curEdit.shift_1_start||"6")/24)*100}%`,width:`${((parseInt(curEdit.shift_1_end||"14")-parseInt(curEdit.shift_1_start||"6"))/24)*100}%`,height:"100%",background:"rgba(0,255,136,0.2)",borderLeft:"2px solid #00ff88",borderRight:"2px solid #00ff88",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            <span style={{fontSize:"0.6rem",color:"#00ff88",fontWeight:800}}>1ST</span>
                          </div>
                          <div style={{position:"absolute",left:`${(parseInt(curEdit.shift_2_start||"14")/24)*100}%`,width:`${((parseInt(curEdit.shift_2_end||"22")-parseInt(curEdit.shift_2_start||"14"))/24)*100}%`,height:"100%",background:"rgba(167,139,250,0.2)",borderLeft:"2px solid #a78bfa",borderRight:"2px solid #a78bfa",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            <span style={{fontSize:"0.6rem",color:"#a78bfa",fontWeight:800}}>2ND</span>
                          </div>
                        </div>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",marginTop:"0.25rem"}}>
                        {["00:00","06:00","12:00","18:00","24:00"].map(t=><span key={t} style={{fontSize:"0.55rem",color:"#475569"}}>{t}</span>)}
                      </div>
                    </div>
                  )}

                  {activeSettingsTab==="sounds" && (() => {
                    const SOUND_TYPES = [
                      { key:"new_request",   label:"New Request",    icon:"📦", desc:"Warehouse gets a new delivery request" },
                      { key:"high_priority", label:"High Priority",  icon:"🔥", desc:"Urgent / high priority request arrives" },
                      { key:"completed",     label:"Delivered",      icon:"✅", desc:"Order marked as delivered / done" },
                      { key:"cancelled",     label:"Cancelled",      icon:"❌", desc:"Request was cancelled" },
                      { key:"chat",          label:"Chat Message",   icon:"💬", desc:"New chat message received" },
                      { key:"break",         label:"Break Started",  icon:"🍵", desc:"Warehouse worker starts a break" },
                    ];
                    return (
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:"1rem",marginTop:"0.5rem"}}>
                        {SOUND_TYPES.map(st => {
                          const settingKey = `sound_${st.key}`;
                          const hasCustom = !!(sysSettings[settingKey]);
                          return (
                            <div key={st.key} style={{background:"rgba(167,139,250,0.04)",border:`1px solid ${hasCustom?"rgba(167,139,250,0.4)":"#1e293b"}`,borderRadius:"12px",padding:"1.1rem"}}>

                              <div style={{display:"flex",alignItems:"center",gap:"0.6rem",marginBottom:"0.5rem"}}>
                                <span style={{fontSize:"1.3rem"}}>{st.icon}</span>
                                <div>
                                  <div style={{color:"#e2e8f0",fontWeight:900,fontSize:"0.9rem"}}>{st.label}</div>
                                  <div style={{color:"#64748b",fontSize:"0.68rem"}}>{st.desc}</div>
                                </div>
                                {hasCustom && <span style={{marginLeft:"auto",padding:"0.15rem 0.5rem",background:"rgba(167,139,250,0.2)",borderRadius:"6px",color:"#a78bfa",fontSize:"0.6rem",fontWeight:900,whiteSpace:"nowrap"}}>CUSTOM</span>}
                              </div>

                              <div style={{display:"flex",gap:"0.5rem",flexWrap:"wrap",alignItems:"center",marginTop:"0.75rem"}}>

                                <label style={{padding:"0.45rem 0.85rem",borderRadius:"8px",background:"rgba(167,139,250,0.15)",border:"1px solid rgba(167,139,250,0.35)",color:"#a78bfa",fontWeight:900,fontSize:"0.78rem",cursor:"pointer",whiteSpace:"nowrap"}}>
                                  📁 Upload
                                  <input type="file" accept="audio/*" style={{display:"none"}} onChange={async (e) => {
                                    const file = e.target.files[0];
                                    if (!file) return;
                                    if (file.size > 512000) { alert("File too large — max 500 KB. Tip: use a short MP3 (1-2 seconds)."); e.target.value=""; return; }
                                    const reader = new FileReader();
                                    reader.onload = async (ev) => {
                                      const dataUrl = ev.target.result;
                                      await adapterRef.current.saveSetting(settingKey, dataUrl, userName);
                                      const fresh = await adapterRef.current.loadSettings();
                                      _updateSysSettings(fresh);
                                    };
                                    reader.readAsDataURL(file);
                                    e.target.value="";
                                  }}/>
                                </label>

                                <button onClick={() => {
                                  if (hasCustom) {
                                    window._playCustomSound(sysSettings[settingKey]);
                                  } else {
                                    const dingMap = {new_request:"default",high_priority:"high",completed:"done",cancelled:"cancelled",chat:"chat",break:"break"};
                                    window._playDing(dingMap[st.key]||"default");
                                  }
                                }} style={{padding:"0.45rem 0.85rem",borderRadius:"8px",background:"rgba(56,189,248,0.1)",border:"1px solid rgba(56,189,248,0.3)",color:"#38bdf8",fontWeight:900,fontSize:"0.78rem",cursor:"pointer",whiteSpace:"nowrap"}}>
                                  ▶ Preview
                                </button>

                                {hasCustom && (
                                  <button onClick={async () => {
                                    if (!confirm(`Reset "${st.label}" to the default AIM sound?`)) return;
                                    await adapterRef.current.saveSetting(settingKey, "", userName);
                                    const fresh = await adapterRef.current.loadSettings();
                                    _updateSysSettings(fresh);
                                  }} style={{padding:"0.45rem 0.75rem",borderRadius:"8px",background:"transparent",border:"1px solid rgba(255,68,68,0.3)",color:"#ff4444",fontWeight:900,fontSize:"0.78rem",cursor:"pointer",whiteSpace:"nowrap"}}>
                                    ↺ Reset
                                  </button>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}
                </div>
              )}

              <div style={{background:"rgba(15,23,42,0.6)",border:"1px solid #1e293b",borderRadius:"14px",padding:"1.25rem",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"1rem"}}>
                <div>
                  <div style={{color:"#e2e8f0",fontWeight:800,fontSize:"0.9rem"}}>Reset All to Defaults</div>
                  <div style={{color:"#64748b",fontSize:"0.75rem"}}>Restore original factory settings (still requires Save to apply)</div>
                </div>
                <button onClick={()=>{setEditSettings({...DEFAULTS});setDirtyKeys(Object.fromEntries(Object.keys(DEFAULTS).map(k=>[k,true])));}} style={{padding:"0.5rem 1rem",borderRadius:"8px",border:"1px solid rgba(255,68,68,0.3)",background:"transparent",color:"#ff4444",fontWeight:700,cursor:"pointer",fontSize:"0.8rem"}}>Reset Defaults</button>
              </div>
            </div>
          {_breakPanelJsx}
          </div>
        );
      }

      // ═══════════════════════════════════════════════════════════════════════════
      // PREP LIST SCREEN
      // ═══════════════════════════════════════════════════════════════════════════
      if (screen === "preplist") {
        if (!canSupervisor) {
          return (
            <div style={{ minHeight:'100vh', ...bg, padding:'1.5rem', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <div style={{ textAlign:'center', color:'#ff4444' }}>
                <h2>⚠️ Supervisor Access Required</h2>
                <button onClick={()=> setRoute("login")} style={{ padding:'0.7rem 1.5rem', background:'#ff4444', border:'none', borderRadius:'8px', color:'#fff', fontWeight:900, cursor:'pointer', marginTop:'1rem' }}>Go to Login</button>
              </div>
            </div>
          );
        }

        const currentList = editingPrepList ? prepLists.find(p => p.id === editingPrepList) : null;
        const draftLists = prepLists.filter(p => p.status === 'draft');
        const approvedLists = prepLists.filter(p => p.status === 'approved');

        return (
          <div style={{ minHeight:'100vh', ...bg, padding:'1.5rem', position:'relative', overflow:'hidden' }}>
            <div style={gridOverlay} />
            <div style={{ maxWidth:'1200px', margin:'0 auto', position:'relative', zIndex:1 }}>
              <EnhancedHeader title="🅰️ AI Prep List" description="Generate prep lists from historical data" />

              {/* Generate Buttons */}
              {!editingPrepList && (
                <div style={{ marginBottom:'1.5rem', padding:'1.25rem', background:'rgba(167,139,250,0.08)', border:'1px solid rgba(167,139,250,0.3)', borderRadius:'14px' }}>
                  <div style={{ color:'#a78bfa', fontWeight:900, fontSize:'0.9rem', marginBottom:'1rem', textTransform:'uppercase', letterSpacing:'0.06em' }}>
                    Generate Prep List / Current Demand
                  </div>
                  <div style={{ display:'flex', gap:'1rem', flexWrap:'wrap' }}>
                    <button onClick={() => generatePrepList('1st')} disabled={prepListLoading}
                      style={{ padding:'1rem 1.5rem', background:'linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%)', border:'none', borderRadius:'12px', color:'#fff', fontWeight:900, fontSize:'0.95rem', cursor: prepListLoading ? 'wait' : 'pointer', opacity: prepListLoading ? 0.6 : 1 }}>
                      {prepListLoading ? '⏳ Generating...' : '☀️ Prep for 2nd Shift'}

                    <table style={{ width:'100%', borderCollapse:'collapse', minWidth:'800px' }}>
                      <thead>

                            <th key={h} style={headerStyle}>{h}</th>

                      </thead>
                      <tbody>
                        {visibleAssignments.map((a, idx) => {

                            const expColor = daysLeft <= 1 ? '#ff4444' : daysLeft <= 3 ? '#fbbf24' : '#8b9dc3';

                                <td style={cellStyle}><span style={{ color:roleColors2[a.userRole], fontWeight:700, fontSize:'0.8rem', textTransform:'uppercase' }}>{a.userRole}</span></td>

                                  <span style={{ padding:'0.3rem 0.75rem', borderRadius:'20px', background:shift.bg, color:shift.color, fontWeight:900, fontSize:'0.82rem', textTransform:'uppercase', letterSpacing:'0.04em', whiteSpace:'nowrap' }}>

                                </td>
                                <td style={cellStyle}><div style={{ display:'flex', alignItems:'center', gap:'0.4rem' }}><MapPin size={13} color="#38bdf8" />{a.room}</div></td>
                                <td style={cellStyle}>
                                  <span style={{ padding:'0.25rem 0.6rem', borderRadius:'6px', background:`${durationColor[a.duration]}22`, color:durationColor[a.duration], fontWeight:900, fontSize:'0.78rem', textTransform:'uppercase' }}>
