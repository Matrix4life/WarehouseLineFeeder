                                <td style={cellStyle}><div style={{ color:'#8b9dc3', fontSize:'0.82rem' }}>{a.assignedBy}</div></td>
                                <td style={cellStyle}>
                                  <div style={{ color:expColor, fontWeight:700, fontSize:'0.82rem' }}>{expires.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
                                  <div style={{ color:expColor, fontSize:'0.72rem', opacity:0.85 }}>{daysLeft <= 0 ? 'Expired' : daysLeft === 1 ? 'Tomorrow' : `${daysLeft}d`}</div>
                                </td>
                                <td style={cellStyle}>
                                  <button onClick={() => removeAssignment(a.id, a.userName, a.room, a.shift)}
                                    style={{ padding:'0.4rem 0.75rem', background:'rgba(255,68,68,0.1)', border:'1px solid #ff444455', borderRadius:'6px', color:'#ff4444', fontWeight:900, cursor:'pointer', fontSize:'0.78rem' }}>
                                    Remove
                                  </button>
                                </td>
                              </tr>
                            );
                          })
                        }
                      </tbody>
                    </table>
                  </div>
                )}
              </div>

            </div>
            {_breakPanelJsx}
            {_chatUI}
            {_chatFab}
          </div>
        );
      }
      if (screen === "picklist") {
        const picklistRooms = CONFIG.ROOMS.filter(r => !CONFIG.WAREHOUSE_ONLY_ROOMS.includes(r));
        const safeSelectedRooms = Array.isArray(selectedRooms) ? selectedRooms : picklistRooms;
        const toggleRoom = (room) => {
          const safeSelectedRooms = Array.isArray(selectedRooms) ? selectedRooms : [];
          const updated = safeSelectedRooms.includes(room)
            ? safeSelectedRooms.filter(r => r !== room)
            : [...safeSelectedRooms, room];
          setSelectedRooms(updated);
          localStorage.setItem("wd_selectedRooms", JSON.stringify(updated));
        };
        const selectAllRooms = () => {
          setSelectedRooms(picklistRooms);
          localStorage.setItem("wd_selectedRooms", JSON.stringify(picklistRooms));
        };
        const clearAllRooms = () => {
          setSelectedRooms([]);
          localStorage.setItem("wd_selectedRooms", JSON.stringify([]));
        };
        return (
          <div style={{ minHeight:'100vh', ...bg, padding:'1.5rem', position:'relative', overflow:'hidden' }}>
            <div style={gridOverlay} />
            <div style={{ maxWidth:'1500px', margin:'0 auto', position:'relative', zIndex:1 }}>
              <EnhancedHeader title="Pick List" description="Real-time warehouse picking" />

              <div style={{ marginBottom:'0.9rem', padding:'0.6rem 0.9rem', background:'rgba(0,255,136,0.1)', border:'1px solid rgba(0,255,136,0.2)', borderRadius:'10px', color:'#00ff88', fontSize:'0.75rem', textAlign:'center', letterSpacing:'0.05em' }}>
                ✅ Claim → Start → Done • Tap ↩ to undo any step • Multi-user safe
              </div>

              <div style={{ display:'flex', gap:'0.75rem', flexWrap:'wrap', alignItems:'center', marginBottom:'0.9rem' }}>
                <div style={{ color:'#64748b', fontSize:'0.75rem' }}>Group:</div>
                <select value={viewGroup} onChange={(e)=> setViewGroup(e.target.value)}
                  style={{ background:'#1e293b', border:'1px solid #334155', color:'#e2e8f0', padding:'0.45rem 0.6rem', borderRadius:'8px' }}>
                  <option value="room">Room</option>
                  <option value="item">Item</option>
                  <option value="status">Status</option>
                </select>

                <label style={{ display:'flex', alignItems:'center', gap:'0.4rem', color:'#8b9dc3', fontSize:'0.8rem' }}>
                  <input type="checkbox" checked={onlyActive} onChange={(e)=> setOnlyActive(e.target.checked)} />
                  Active only
                </label>

                <input value={search} onChange={(e)=> setSearch(e.target.value)} placeholder="Search item / room / person…"
                  style={{ flex:'1 1 280px', background:'#1e293b', border:'1px solid #334155', color:'#e2e8f0', padding:'0.6rem 0.7rem', borderRadius:'10px' }} />

                <select value={sortMode} onChange={(e)=> setSortMode(e.target.value)}
                  style={{ background:'#1e293b', border:'1px solid #334155', color:'#e2e8f0', padding:'0.45rem 0.6rem', borderRadius:'8px' }}>
                  <option value="priority_age">Priority + Age</option>
                  <option value="age">Age</option>
                  <option value="room">Room</option>
                  <option value="item">Item</option>
                </select>

                <div style={{ color:'#64748b', fontSize:'0.8rem' }}>
                  Actions: {canWarehouseAct ? <span style={{ color:'#00ff88', fontWeight:900 }}>enabled</span> : <span style={{ color:'#fbbf24', fontWeight:900 }}>read-only</span>}
                </div>
              </div>

              <div style={{ marginBottom:'1rem', padding:'1rem', background:'rgba(15,23,42,0.85)', border:'1px solid rgba(56,189,248,0.2)', borderRadius:'12px' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'0.75rem', flexWrap:'wrap', gap:'0.5rem' }}>
                  <div style={{ color:'#38bdf8', fontWeight:900, fontSize:'0.85rem', textTransform:'uppercase', letterSpacing:'0.06em' }}>
                    🎯 Filter Rooms
                  </div>
                  <div style={{ display:'flex', gap:'0.5rem' }}>
                    <button onClick={selectAllRooms}
                      style={{ padding:'0.35rem 0.75rem', background:'rgba(56,189,248,0.1)', border:'1px solid #38bdf8', borderRadius:'6px', color:'#38bdf8', fontWeight:900, fontSize:'0.72rem', cursor:'pointer', textTransform:'uppercase' }}>
                      ✓ All
                    </button>
                    <button onClick={clearAllRooms}
                      style={{ padding:'0.35rem 0.75rem', background:'transparent', border:'1px solid #64748b', borderRadius:'6px', color:'#64748b', fontWeight:900, fontSize:'0.72rem', cursor:'pointer', textTransform:'uppercase' }}>
                      ✗ Clear
                    </button>
                  </div>
                </div>
                <div style={{ display:'flex', flexWrap:'wrap', gap:'0.6rem' }}>
                  {picklistRooms.map(room => {
                    const isSelected = safeSelectedRooms.includes(room);
                    const roomColor = CONFIG.ROOM_COLORS[room] || '#00ff88';
                    return (
                      <div key={room} onClick={() => toggleRoom(room)}
                        style={{ display:'flex', alignItems:'center', gap:'0.5rem', padding:'0.6rem 1rem', borderRadius:'8px', cursor:'pointer', background: isSelected ? `${roomColor}15` : 'rgba(30,41,59,0.5)', border: isSelected ? `2px solid ${roomColor}` : '2px solid #334155', transition:'all 0.2s', userSelect:'none' }}>
                        <div style={{ width:'16px', height:'16px', borderRadius:'3px', border: `2px solid ${isSelected ? roomColor : '#64748b'}`, background: isSelected ? roomColor : 'transparent', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.2s' }}>
                          {isSelected && <span style={{ color:'#0a0e1a', fontSize:'0.7rem', fontWeight:900 }}>✓</span>}
                        </div>
                        <span style={{ color: isSelected ? roomColor : '#64748b', fontWeight:900, fontSize:'0.85rem' }}>
                          {room}
                        </span>
                      </div>
                    );
                  })}
                </div>
                <div style={{ marginTop:'0.6rem', color:'#64748b', fontSize:'0.72rem' }}>
                  Showing {safeSelectedRooms.filter(r => picklistRooms.includes(r)).length} of {picklistRooms.length} rooms
                </div>
              </div>

              {grouped.keys.filter(groupKey => safeSelectedRooms.some(sel => groupKey === sel || groupKey.startsWith(sel + " →"))).length === 0 ? (
                <div style={{ padding:'4rem 2rem', textAlign:'center', background:'rgba(15,23,42,0.85)', border:'1px solid rgba(0,255,136,0.2)', borderRadius:'14px' }}>
                  <Package size={64} color="#334155" />
                  <h3 style={{ color:'#64748b', margin:'1rem 0 0 0' }}>
                    {safeSelectedRooms.length === 0 ? 'No rooms selected' : 'No requests'}
                  </h3>
                  {safeSelectedRooms.length === 0 && (
                    <p style={{ color:'#64748b', fontSize:'0.9rem', margin:'0.5rem 0 0 0' }}>Select rooms above to view requests</p>
                  )}
                </div>
              ) : (
                <div style={{ display:'flex', flexDirection:'column', gap:'1rem' }}>
                  {grouped.keys.filter(groupKey => safeSelectedRooms.some(sel => groupKey === sel || groupKey.startsWith(sel + " →"))).map(groupKey => {
                    const _baseRoom = groupKey.includes(' → ') ? groupKey.split(' → ')[0] : groupKey;
                    const roomColor = CONFIG.ROOM_COLORS[groupKey] || CONFIG.ROOM_COLORS[_baseRoom] || '#00ff88';
                    return (
                    <div key={groupKey} style={{ background:'rgba(15,23,42,0.85)', border:`1px solid ${roomColor}33`, borderRadius:'14px', overflow:'hidden' }}>
                      <div style={{ padding:'0.9rem 1.2rem', background:`linear-gradient(135deg, ${roomColor}22 0%, ${roomColor}08 100%)`, borderBottom:`2px solid ${roomColor}`, display:'flex', alignItems:'center', gap:'0.75rem' }}>
                        <MapPin size={20} color={roomColor} />
                        <div style={{ color:'#ffffff', fontWeight:900, textTransform:'uppercase', letterSpacing:'0.09em' }}>{groupKey}</div>
                        <div style={{ marginLeft:'auto', color:'#8b9dc3', fontSize:'0.85rem' }}>{grouped.map[groupKey].length}</div>
                      </div>

                      <div style={{ display:'flex', flexDirection:'column', gap:'0' }}>
                            {grouped.map[groupKey].map((req, idx) => {
                              const sla = slaBadge(req);
                              const statusColor =
                                req.status==="pending" ? "#fbbf24" :
                                req.status==="claimed" ? "#38bdf8" :
                                req.status==="in_progress" ? "#a78bfa" :
                                req.status==="completed" ? "#00ff88" :
                                "#ff4444";
                              const lockedByOther = !!req.claimedBy && req.claimedBy !== userName && !canSupervisor;
                              const canActThis = canWarehouseAct && !lockedByOther && req.status !== "completed" && req.status !== "cancelled";
                              return (
                                <div key={req.id} style={{ padding:'0.85rem 1rem', borderBottom: idx < grouped.map[groupKey].length-1 ? '1px solid #1e293b' : 'none', opacity: req.status==="completed" ? 0.65 : 1, background: idx%2===0 ? 'transparent' : 'rgba(0,255,136,0.015)' }}>

                                  <div style={{ display:'flex', alignItems:'center', gap:'0.5rem', marginBottom:'0.5rem', flexWrap:'wrap' }}>
                                    <span style={{ padding:'0.2rem 0.5rem', borderRadius:'8px', background:sla.bg, color:sla.fg, fontWeight:900, fontSize:'0.72rem', flexShrink:0 }}>
                                      {sla.label}
                                    </span>
                                    <span style={{ display:'flex', alignItems:'center', gap:'0.35rem', fontWeight:900, color:'#e2e8f0', fontSize:'0.95rem', flex:1, minWidth:0 }}>
                                      <Package size={14} color="#00ff88" />
                                      {/^\d+$/.test(req.item) ? String(Number(req.item)) : req.item}
                                    </span>
                                    {req.priority && (
                                      <span style={{ padding:'0.15rem 0.45rem', background:'#ff4444', borderRadius:'8px', color:'#fff', fontWeight:900, fontSize:'0.68rem', flexShrink:0 }}>HIGH</span>
                                    )}
                                    {req.isAiGenerated && (
                                      <span style={{ padding:'0.15rem 0.45rem', background:'rgba(167,139,250,0.2)', border:'1px solid #a78bfa', borderRadius:'8px', color:'#a78bfa', fontWeight:900, fontSize:'0.65rem', flexShrink:0 }}>🅰️ AI</span>
                                    )}
                                    {(req.comments || "").includes("🔄 Balance:") && (
                                      <span style={{ padding:'0.15rem 0.45rem', background:'rgba(251,191,36,0.2)', border:'1px solid #fbbf24', borderRadius:'8px', color:'#fbbf24', fontWeight:900, fontSize:'0.65rem', flexShrink:0 }}>🔄 BALANCE</span>
                                    )}
                                    <span style={{ padding:'0.2rem 0.5rem', borderRadius:'8px', background:statusColor, color:'#0a0e1a', fontWeight:900, fontSize:'0.68rem', textTransform:'uppercase', flexShrink:0 }}>
                                      {req.status.replace("_"," ")}
                                    </span>
                                  </div>

                                  <div style={{ display:'flex', alignItems:'center', gap:'0.6rem', marginBottom:'0.5rem', flexWrap:'wrap', fontSize:'0.78rem', color:'#8b9dc3' }}>
                                    <span style={{ display:'inline-flex', alignItems:'center', gap:'0.35rem' }}>
                                      <span style={{ fontSize:'0.78rem', color:'#8b9dc3' }}>Qty:</span>
                                      {editingId === req.id ? (
                                        <span style={{ display:'inline-flex', gap:'0.3rem', alignItems:'center', flexWrap:'wrap' }}>
                                          <span style={{ fontSize:'0.7rem', color:'#64748b', width:'100%' }}>How many are you delivering now? (remaining: {getRemainingQty(req)})</span>
                                          <input type="tel" inputMode="numeric" value={editQty}
                                            placeholder="0"
                                            onChange={(e)=>{ const r=e.target.value.replace(/[^0-9]/g,''); setEditQty(r===''?'':String(Number(r))); }}
                                            style={{ width:'55px', padding:'0.22rem 0.35rem', background:'#1e293b', border:'2px solid #38bdf8', borderRadius:'6px', color:'#38bdf8', fontWeight:900, fontSize:'0.95rem', outline:'none' }} />
                                          <button onClick={()=> adjustQty(req.id, Number(editQty)||0)}
                                            style={{ padding:'0.22rem 0.5rem', background:'#38bdf8', border:'none', borderRadius:'6px', cursor:'pointer', display:'inline-flex', alignItems:'center' }}>
                                            <Save size={14} color="#0a0e1a" />
                                          </button>
                                          <button onClick={()=> setEditingId(null)}
                                            style={{ padding:'0.22rem 0.4rem', background:'transparent', border:'1px solid #334155', borderRadius:'6px', cursor:'pointer', color:'#64748b', fontSize:'0.78rem' }}>
                                            ✕
                                          </button>
                                        </span>
                                      ) : (
                                        <>
                                          <span style={{ color:'#38bdf8', fontWeight:900, fontSize:'1.15rem', lineHeight:1 }}>{getRemainingQty(req)}</span>
                                          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                                          {req.adjQty > 0 && req.adjQty < req.qty && <span style={{ color:'#fbbf24', fontWeight:900, fontSize:'0.85rem' }}>{req.qty}</span>}
                                          {Array.isArray(req.qtyHistory) && req.qtyHistory.length > 0 && (
                                            <button onClick={()=> setExpandedHistory(prev => prev === req.id ? null : req.id)}
                                              style={{ display:'inline-flex', alignItems:'center', gap:'4px', padding:'2px 8px', background:'transparent', border:'1px solid #334155', borderRadius:'20px', cursor:'pointer', fontSize:'0.72rem', color:'#64748b', fontFamily:'inherit' }}>
                                              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{ transform: expandedHistory===req.id ? 'rotate(180deg)' : 'rotate(0deg)', transition:'transform 0.15s' }}><polyline points="6 9 12 15 18 9"/></svg>
                                              {req.qtyHistory.length} {req.qtyHistory.length === 1 ? 'delivery' : 'deliveries'}
                                            </button>
                                          )}
                                          {canActThis && req.claimedBy && (
                                            <button onClick={()=>{ setEditingId(req.id); setEditQty(''); }}
                                              title="Adjust picked quantity"
                                              style={{ padding:'0.22rem 0.45rem', background:'transparent', border:'1px solid #334155', borderRadius:'6px', cursor:'pointer', display:'inline-flex', alignItems:'center' }}>
                                              <Edit2 size={14} color="#64748b" />
                                            </button>
                                          )}
                                        </>
                                      )}
                                    </span>
                                    <span style={{ display:'flex', alignItems:'center', gap:'0.25rem' }}>
                                      <Clock size={11} color="#64748b" />
                                      {niceTime(req.submittedAt)}
                                    </span>
                                    <span style={{ color:'#00ff88', fontWeight:700 }}>{req.submittedBy || "?"}</span>
                                    {req.claimedBy && (
                                      <span style={{ color: lockedByOther ? '#fbbf24' : '#38bdf8', fontWeight:700 }}>
                                        🔒 {req.claimedBy}
                                      </span>
                                    )}
                                  </div>
                                  {expandedHistory === req.id && Array.isArray(req.qtyHistory) && req.qtyHistory.length > 0 && (()=>{
                                    const fmtT = (iso) => { try { return new Date(iso).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); } catch{return '';} };
                                    const steps = req.qtyHistory;
                                    const rows = steps.map((h, i) => {
                                      // Support both old format (qty only) and new format (delivered + newBalance)
                                      const delivered = h.delivered !== undefined ? h.delivered
                                        : (i === 0 ? req.qty - h.qty : steps[i-1].qty - h.qty);
                                      return { delivered, qty: h.newBalance !== undefined ? h.newBalance : h.qty, by: h.by, at: h.at };
                                    });
                                    return (
                                      <div style={{ background:'rgba(56,189,248,0.06)', border:'1px solid rgba(56,189,248,0.2)', borderLeft:'2px solid #38bdf8', borderRadius:'8px', padding:'0.55rem 0.75rem', marginBottom:'0.5rem' }}>
                                        <div style={{ fontSize:'0.65rem', fontWeight:900, color:'#38bdf8', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:'0.4rem' }}>Delivery history</div>
                                        <div style={{ display:'flex', flexDirection:'column', gap:'4px' }}>
                                          {rows.map((row, i) => (
                                            <div key={i} style={{ display:'flex', alignItems:'center', gap:'8px', fontSize:'0.78rem' }}>
                                              <span style={{ width:6, height:6, borderRadius:'50%', background:'#4ade80', flexShrink:0, display:'inline-block' }}/>
                                              <span style={{ fontWeight:900, color:'#e2e8f0' }}>{row.delivered !== undefined ? row.delivered : row.picked} delivered</span>
                                              <span style={{ color:'#64748b' }}>by {row.by}</span>
                                              <span style={{ color:'#475569', marginLeft:'auto' }}>{fmtT(row.at)}</span>
                                            </div>
                                          ))}
                                          <div style={{ borderTop:'1px solid rgba(56,189,248,0.15)', marginTop:'3px', paddingTop:'5px', display:'flex', alignItems:'center', gap:'8px', fontSize:'0.78rem' }}>
                                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                                            <span style={{ fontWeight:900, color:'#38bdf8' }}>{getRemainingQty(req)} still needed</span>
                                          </div>
                                        </div>
                                      </div>
                                    );
                                  })()}
                                  {req.comments && (()=>{
                                    const _c = req.comments || "";
                                    const _bi = _c.indexOf("Balance: ");
                                    const _nl = _bi >= 0 ? _c.indexOf("\n", _bi) : -1;
                                    const _clean = _bi >= 0
                                      ? (_c.slice(0, Math.max(0,_bi-2)) + (_nl >= 0 ? _c.slice(_nl+1) : "")).trim()
                                      : _c.trim();
                                    const _bNum = _bi >= 0 ? _c.slice(_bi+9).match(/^(\d+)/) : null;
                                    return (<>
                                      {_bNum && (
                                        <div style={{ color:'#fbbf24', fontSize:'0.75rem', marginBottom:'0.25rem', fontWeight:700 }}>
                                          🔄 Previous remaining balance: {_bNum[1]}
                                        </div>
                                      )}
                                      {_clean && (
                                        <div style={{ color:'#8b9dc3', fontStyle:'italic', fontSize:'0.78rem', marginBottom:'0.4rem', lineHeight:1.45, wordBreak:'break-word' }}>
                                          💬 {_clean}
                                        </div>
                                      )}
                                    </>);
                                  })()}

                                  <div style={{ display:'flex', gap:'0.4rem', flexWrap:'wrap' }}>
                                    {req.status === "pending" && (
                                      <button disabled={!canActThis} onClick={()=> claimRequest(req.id)}
                                        style={{ opacity: canActThis ? 1 : 0.45, padding:'0.45rem 0.9rem', background:'#38bdf8', border:'none', borderRadius:'8px', fontWeight:900, cursor: canActThis ? 'pointer' : 'not-allowed', fontSize:'0.85rem', color:'#0a0e1a' }}>
                                        Claim
                                      </button>
                                    )}

                                    {req.status === "claimed" && (req.claimedBy === userName || canSupervisor) && (
                                      <button onClick={()=> unclaimRequest(req.id)}
                                        title="Undo claim — puts request back to Pending"
                                        style={{ padding:'0.45rem 0.75rem', background:'transparent', border:'2px solid #38bdf8', borderRadius:'8px', fontWeight:900, cursor:'pointer', fontSize:'0.8rem', color:'#38bdf8', display:'inline-flex', alignItems:'center', gap:'0.25rem' }}>
                                        ↩ Unclaim
                                      </button>
                                    )}
                                    {req.status === "claimed" && (
                                      <button disabled={!canActThis} onClick={()=> startRequest(req.id)}
                                        style={{ opacity: canActThis ? 1 : 0.45, padding:'0.45rem 0.9rem', background:'#a78bfa', border:'none', borderRadius:'8px', fontWeight:900, cursor: canActThis ? 'pointer' : 'not-allowed', fontSize:'0.85rem', color:'#0a0e1a' }}>
                                        Start
                                      </button>
                                    )}

                                    {req.status === "in_progress" && (req.claimedBy === userName || canSupervisor) && (
                                      <button onClick={()=> unstartRequest(req.id)}
                                        title="Undo start — puts request back to Claimed"
                                        style={{ padding:'0.45rem 0.75rem', background:'transparent', border:'2px solid #a78bfa', borderRadius:'8px', fontWeight:900, cursor:'pointer', fontSize:'0.8rem', color:'#a78bfa', display:'inline-flex', alignItems:'center', gap:'0.25rem' }}>
                                        ↩ Un-Start
                                      </button>
                                    )}
                                    {req.status === "in_progress" && (
                                      <button disabled={!canActThis} onClick={()=> completeRequest(req.id)}
                                        style={{ opacity: canActThis ? 1 : 0.45, padding:'0.45rem 0.9rem', background:'linear-gradient(135deg,#00ff88,#00cc6f)', border:'none', borderRadius:'8px', fontWeight:900, cursor: canActThis ? 'pointer' : 'not-allowed', fontSize:'0.85rem', color:'#0a0e1a', display:'inline-flex', alignItems:'center', gap:'0.25rem' }}>
                                        <CheckCircle size={14} color="#0a0e1a" /> Done
                                      </button>
                                    )}
                                    {req.status !== "completed" && req.status !== "cancelled" && (
                                      <button disabled={!canActThis} onClick={()=> cancelRequest(req.id)}
                                        style={{ opacity: canActThis ? 1 : 0.45, padding:'0.45rem 0.6rem', background:'transparent', border:'1px solid #ff444466', borderRadius:'8px', cursor: canActThis ? 'pointer' : 'not-allowed' }}>
                                        <XCircle size={14} color={canActThis ? "#ff4444" : "#64748b"} />
                                      </button>
                                    )}
                                    {req.status === "completed" && req.completedAt && (
                                      <span style={{ color:'#00ff88', fontSize:'0.75rem', fontWeight:900, alignSelf:'center' }}>
                                        ✓ {niceTime(req.completedAt)}{req.completedBy ? ` by ${req.completedBy}` : ""}
                                      </span>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                    </div>
                    );
                  })}
                </div>
              )}
            </div>
            {_breakPanelJsx}
            {_chatUI}
            {_chatFab}
          </div>
        );
      }
      return (
        <div style={{ minHeight:'100vh', ...bg, padding:'1.5rem', position:'relative', overflow:'hidden' }}>
          <div style={gridOverlay} />
          <div style={{ maxWidth:'780px', margin:'0 auto', position:'relative', zIndex:1 }}>
            <EnhancedHeader title="Delivery Request" description="Create new warehouse request" />

            <div style={{ marginBottom:'0.9rem', padding:'0.65rem 0.9rem', background:'rgba(0,255,136,0.1)', border:'1px solid rgba(0,255,136,0.2)', borderRadius:'10px', color:'#00ff88', fontSize:'0.75rem', textAlign:'center', letterSpacing:'0.05em' }}>
              ℹ️ Submitting creates a shared request visible instantly

            {successMsg && (
              <div style={{ marginTop:'0.75rem', padding:'0.75rem 1rem', background:'rgba(0,255,136,0.12)', border:'1px solid rgba(0,255,136,0.25)', borderRadius:'10px', color:'#00ff88', fontSize:'0.85rem', fontWeight:700, letterSpacing:'0.04em', textAlign:'center' }}>
                {successMsg}
              </div>
            )}
</div>

            <form onSubmit={submitRequest} style={{ background:'rgba(15,23,42,0.85)', border:'1px solid rgba(0,255,136,0.2)', borderRadius:'14px', padding:'2rem', boxShadow:'0 8px 32px rgba(0,0,0,0.28)' }}>
              <div style={{ marginBottom:'1.1rem' }}>
                <label style={{ display:'flex', alignItems:'center', gap:'0.5rem', color:'#e2e8f0', fontSize:'0.85rem', fontWeight:900, marginBottom:'0.5rem', textTransform:'uppercase', letterSpacing:'0.05em' }}>
                  <Package size={16} color="#00ff88" /> Item <span style={{ color:'#00ff88' }}>*</span>
                </label>
                <input
                  type="tel"
                  inputMode="numeric"
                  pattern="[0-9]*"
                  value={formData.item}
                  onChange={(e)=> setFormData({ ...formData, item: e.target.value.replace(/[^0-9]/g, '') })}
                  style={{ width:'100%', padding:'0.875rem', background:'#1e293b', border:`2px solid ${errors.item ? '#ff4444' : (formData.item ? '#00ff88' : '#334155')}`, borderRadius:'10px', color:'#e2e8f0', fontSize:'1rem', outline:'none' }}
                  placeholder="Item number"
                />
                {errors.item && <div style={{ marginTop:'0.35rem', color:'#ff4444', fontSize:'0.78rem', display:'flex', gap:'0.35rem', alignItems:'center' }}><AlertCircle size={12} /> {errors.item}</div>}
              </div>

              <div style={{ marginBottom:'1.1rem', position:'relative' }} ref={dropdownRef}>
                <label style={{ display:'flex', alignItems:'center', gap:'0.5rem', color:'#e2e8f0', fontSize:'0.85rem', fontWeight:900, marginBottom:'0.5rem', textTransform:'uppercase', letterSpacing:'0.05em' }}>
                  <MapPin size={16} color="#00ff88" /> Room <span style={{ color:'#00ff88' }}>*</span>
                </label>

                <div onClick={()=> setRoomDropdownOpen(!roomDropdownOpen)}
                  style={{ width:'100%', padding:'0.875rem', background:'#1e293b', border:`2px solid ${errors.room ? '#ff4444' : (formData.room ? '#00ff88' : '#334155')}`, borderRadius:'10px', color: formData.room ? '#e2e8f0' : '#64748b', cursor:'pointer', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <span>{formData.room === "Film/Labels" && formData.subRoom ? `Film/Labels → ${formData.subRoom}` : formData.room || "Select room…"}</span>
                  <span style={{ color:'#00ff88', transform: roomDropdownOpen ? 'rotate(180deg)' : 'rotate(0deg)', transition:'transform 0.2s ease' }}>▼</span>
                </div>
                {errors.room && <div style={{ marginTop:'0.35rem', color:'#ff4444', fontSize:'0.78rem', display:'flex', gap:'0.35rem', alignItems:'center' }}><AlertCircle size={12} /> {errors.room}</div>}

                {roomDropdownOpen && (
                  <div style={{ position:'absolute', top:'100%', left:0, right:0, marginTop:'0.5rem', background:'#1e293b', border:'2px solid #00ff88', borderRadius:'10px', boxShadow:'0 12px 28px rgba(0,255,136,0.15)', zIndex:10, overflow:'hidden' }}>
                    <input value={roomSearch} onChange={(e)=> setRoomSearch(e.target.value)} onClick={(e)=> e.stopPropagation()}
                      placeholder="Search rooms…"
                      style={{ width:'100%', padding:'0.75rem', background:'#0f172a', border:'none', borderBottom:'1px solid #334155', color:'#e2e8f0', outline:'none' }} />
                    {filteredRooms.map((room, idx) => (
                      <div key={room} onClick={()=> { setFormData({ ...formData, room, subRoom: room === "Film/Labels" ? formData.subRoom : "" }); setRoomDropdownOpen(false); setRoomSearch(""); }}
                        style={{ padding:'0.85rem', cursor:'pointer', color:'#e2e8f0', borderBottom: idx < filteredRooms.length-1 ? '1px solid #334155' : 'none' }}
                        onMouseEnter={(e)=> { e.currentTarget.style.background='rgba(0,255,136,0.1)'; e.currentTarget.style.color='#00ff88'; }}
                        onMouseLeave={(e)=> { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#e2e8f0'; }}
                      >
                        {room}
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Film/Labels sub-room destination */}
              {formData.room === "Film/Labels" && (
                <div style={{ marginBottom:'1.1rem' }}>
                  <label style={{ display:'flex', alignItems:'center', gap:'0.5rem', color:'#e2e8f0', fontSize:'0.85rem', fontWeight:900, marginBottom:'0.5rem', textTransform:'uppercase', letterSpacing:'0.05em' }}>
                    <MapPin size={16} color="#fbbf24" /> Delivering To <span style={{ color:'#00ff88' }}>*</span>
                    <span style={{ fontSize:'0.65rem', color:'#64748b', fontWeight:400, textTransform:'none', letterSpacing:0 }}>— which room needs this?</span>
                  </label>
                  <div style={{ display:'flex', gap:'0.5rem', flexWrap:'wrap' }}>
                    {CONFIG.FILM_LABELS_DESTINATIONS.map(dest => (
                      <button key={dest} type="button"
                        onClick={() => setFormData({ ...formData, subRoom: dest })}
                        style={{
                          flex:'1 1 80px', padding:'0.85rem 0.5rem',
                          borderRadius:'10px', fontWeight:900, cursor:'pointer',
                          textTransform:'uppercase', letterSpacing:'0.05em',
                          fontSize:'0.85rem', fontFamily:'inherit',
                          background: formData.subRoom === dest ? 'linear-gradient(135deg,#fbbf24,#f59e0b)' : '#1e293b',
                          border: formData.subRoom === dest ? '2px solid #fbbf24' : '2px solid #334155',
                          color: formData.subRoom === dest ? '#0a0e1a' : '#e2e8f0',
                          boxShadow: formData.subRoom === dest ? '0 4px 14px rgba(251,191,36,0.3)' : 'none',
                          transition: 'all 0.15s ease'
                        }}>
                        {dest}
                      </button>
                    ))}
                  </div>
                  {errors.subRoom && (
                    <div style={{ marginTop:'0.35rem', color:'#ff4444', fontSize:'0.78rem', display:'flex', gap:'0.35rem', alignItems:'center' }}>
                      <AlertCircle size={12} /> {errors.subRoom}
                    </div>
                  )}
                </div>
              )}

              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1rem', marginBottom:'1.1rem' }}>
                <div>
                  <label style={{ display:'block', color:'#e2e8f0', fontSize:'0.85rem', fontWeight:900, marginBottom:'0.5rem', textTransform:'uppercase', letterSpacing:'0.05em' }}>
                    Qty <span style={{ color:'#00ff88' }}>*</span>
                  </label>
                  <input
                    type="tel"
                    inputMode="numeric"
                    pattern="[0-9]*"
                    value={formData.qty === 0 ? '' : formData.qty}
                    onChange={(e)=> setFormData({ ...formData, qty: parseInt(e.target.value.replace(/[^0-9]/g, ''))||0 })}
                    style={{ width:'100%', padding:'0.875rem', background:'#1e293b', border:`2px solid ${errors.qty ? '#ff4444' : '#334155'}`, borderRadius:'10px', color:'#e2e8f0', fontSize:'1rem', outline:'none', MozAppearance:'textfield', WebkitAppearance:'none' }}
                    placeholder="0"
                  />
                  {errors.qty && <div style={{ marginTop:'0.35rem', color:'#ff4444', fontSize:'0.78rem', display:'flex', gap:'0.35rem', alignItems:'center' }}><AlertCircle size={12} /> {errors.qty}</div>}
                </div>

                <div>
                  <label style={{ display:'block', color:'#e2e8f0', fontSize:'0.85rem', fontWeight:900, marginBottom:'0.5rem', textTransform:'uppercase', letterSpacing:'0.05em' }}>
                    Priority
                  </label>
                  <div style={{ display:'flex', gap:'0.5rem' }}>
                    {[
                      { key:false, label:"Normal", bg:"#1e293b", border:"#334155", color:"#e2e8f0" },
                      { key:true, label:"High", bg:"linear-gradient(135deg, #ff4444 0%, #cc0000 100%)", border:"#ff4444", color:"#fff" }
                    ].map(opt => (
                      <button key={String(opt.key)} type="button"
                        onClick={()=> setFormData({ ...formData, priority: opt.key })}
                        style={{ flex:1, padding:'0.875rem', borderRadius:'10px', background: formData.priority === opt.key ? opt.bg : "#1e293b", border: formData.priority === opt.key ? `2px solid ${opt.border}` : "2px solid #334155", color: formData.priority === opt.key ? opt.color : "#e2e8f0", fontWeight:900, cursor:'pointer', textTransform:'uppercase', letterSpacing:'0.06em' }}
                      >
                        {opt.label}
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              <div style={{ marginBottom:'1.1rem' }}>
                <label style={{ display:'flex', alignItems:'center', gap:'0.5rem', color:'#e2e8f0', fontSize:'0.85rem', fontWeight:900, marginBottom:'0.5rem', textTransform:'uppercase', letterSpacing:'0.05em' }}>
                  <MessageSquare size={16} color="#00ff88" /> Comments
                </label>
                <textarea value={formData.comments} onChange={(e)=> setFormData({ ...formData, comments:e.target.value })}
                  rows={4}
                  style={{ width:'100%', padding:'0.875rem', background:'#1e293b', border:'2px solid #334155', borderRadius:'10px', color:'#e2e8f0', outline:'none', resize:'vertical' }}
                  placeholder="Any notes (size, urgency reason, where to drop, etc.)"
                />
              </div>

              <button type="submit"
                style={{ width:'100%', padding:'1.1rem', background:'linear-gradient(135deg, #00ff88 0%, #00cc6f 100%)', border:'none', borderRadius:'12px', color:'#0a0e1a', fontSize:'1.05rem', fontWeight:900, cursor:'pointer', textTransform:'uppercase', letterSpacing:'0.08em', boxShadow:'0 4px 18px rgba(0,255,136,0.35)' }}>
                Submit Request
              </button>

              {userRole === "room" && (
                <div style={{ marginTop:'1rem', color:'#64748b', fontSize:'0.8rem' }}>
                  Room role is submit + view only. Warehouse/Supervisor handle claiming and completion.
                </div>
              )}
            </form>
            {_breakPanelJsx}
            {_chatUI}
            {_chatFab}
          </div>
        </div>
      );
    }
    ReactDOM.render(<WarehouseDeliveryApp />, document.getElementById("root"));
  </script>

  <script>
    // ── PWA Install Prompt ────────────────────────────────────────────────────
    window._deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); // suppress mini-bar, use our own button
      window._deferredInstallPrompt = e;
      // Signal React to show the install button
      const btn = document.getElementById('wd-install-btn');
      if (btn) btn.style.display = 'inline-flex';
      // Also dispatch event so React state can react
      window.dispatchEvent(new CustomEvent('wd-install-ready'));
    });
    window.addEventListener('appinstalled', () => {
      window._deferredInstallPrompt = null;
      const btn = document.getElementById('wd-install-btn');
      if (btn) btn.style.display = 'none';
      window.dispatchEvent(new CustomEvent('wd-install-done'));
    });

    // ── Service Worker Registration (real sw.js file — required for push) ───
    // IMPORTANT: Blob-URL service workers CANNOT receive push events.
    // The sw.js file must be deployed alongside index.html at the same root.
    if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('./sw.js', { scope: '/' });
          // Expose for _showNativeNotif
          window._swReg = reg;
          console.log('[SW] Registered from sw.js — push notifications enabled');

          const banner = document.getElementById('wd-update-banner');
          let waitingSW = null;

          function showUpdateBanner(sw) {
            waitingSW = sw;
            if (banner) banner.classList.add('wd-update-visible');
          }

          window._wdDoUpdate = () => {
            if (banner) banner.classList.remove('wd-update-visible');
            if (waitingSW) {
              waitingSW.postMessage('SKIP_WAITING');
            } else {
              window.location.reload();
            }
          };

          window._wdDismissUpdate = () => {
            if (banner) banner.classList.remove('wd-update-visible');
          };

          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing;
            if (!newSW) return;
            newSW.addEventListener('statechange', () => {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateBanner(newSW);
              }
            });
          });

          if (reg.waiting && navigator.serviceWorker.controller) {
            showUpdateBanner(reg.waiting);
          }

          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshing) return;
            refreshing = true;
            setTimeout(() => window.location.reload(), 200);
          });

          // Poll for updates every 5 minutes
          setInterval(() => reg.update(), 5 * 60 * 1000);

          // Check on visibility change (user returns to tab / unlocks phone)
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') reg.update();
          });

          // Auto-subscribe to push if user previously had it enabled
          if (localStorage.getItem('wd_push_enabled') === '1') {
            const userName = sessionStorage.getItem('wd_user_name') || localStorage.getItem('wd_user_name');
            if (userName) {
              _subscribePush(userName, CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY)
                .then(() => console.log('[Push] Auto-resubscribed'))
                .catch(() => {});
            }
          }

        } catch (err) {
          console.warn('[SW] Registration failed:', err);
        }
      });
    }
  </script>
